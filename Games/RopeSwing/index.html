<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rope Swing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.4);
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 100%);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            text-align: center;
            z-index: 10;
        }
        #score {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px #e94560;
        }
        #instructions {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">0</div>
        <div id="instructions">Click/Hold to hook • Release to fly</div>
    </div>
    <canvas id="game" width="900" height="600"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const GRAVITY = 0.4;
        const AIR_RESISTANCE = 0.995;
        const HOOK_SPEED = 25;
        const MAX_ROPE_LENGTH = 350;

        let player = {
            x: 200,
            y: 300,
            vx: 0,
            vy: 0,
            radius: 15,
            color: '#00ff88'
        };

        let rope = {
            active: false,
            x: 0,
            y: 0,
            length: 0,
            targetX: 0,
            targetY: 0,
            hookX: 0,
            hookY: 0,
            hooking: false,
            hooked: false
        };

        let camera = { y: 0, targetY: 0 };
        let score = 0;
        let anchors = [];
        let platforms = [];
        let stars = [];
        let gameOver = false;

        function generateAnchors() {
            anchors = [];
            for (let y = -500; y > -10000; y -= 80 + Math.random() * 60) {
                let count = 2 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    anchors.push({
                        x: 100 + Math.random() * (canvas.width - 200),
                        y: y + Math.random() * 40,
                        radius: 8 + Math.random() * 6
                    });
                }
            }
        }

        function generatePlatforms() {
            platforms = [];
            platforms.push({ x: 50, y: 400, width: 150, height: 20 });
            for (let y = 350; y > -10000; y -= 150 + Math.random() * 100) {
                platforms.push({
                    x: Math.random() * (canvas.width - 200),
                    y: y,
                    width: 80 + Math.random() * 100,
                    height: 15
                });
            }
        }

        function generateStars() {
            stars = [];
            for (let i = 0; i < 500; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * -10000,
                    size: Math.random() * 2 + 1,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        function init() {
            generateAnchors();
            generatePlatforms();
            generateStars();
            player.x = 150;
            player.y = 300;
            player.vx = 3;
            player.vy = 0;
            score = 0;
            camera.y = 0;
            camera.targetY = 0;
            gameOver = false;
            rope.active = false;
            rope.hooked = false;
            scoreEl.textContent = score;
        }

        function findClosestAnchor() {
            let closest = null;
            let minDist = MAX_ROPE_LENGTH;
            
            for (let anchor of anchors) {
                let dx = anchor.x - player.x;
                let dy = anchor.y - player.y + camera.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < minDist && anchor.y + camera.y < player.y + 50) {
                    minDist = dist;
                    closest = anchor;
                }
            }
            return closest;
        }

        function update() {
            if (gameOver) return;

            player.vy += GRAVITY;
            player.vx *= AIR_RESISTANCE;
            player.vy *= AIR_RESISTANCE;

            player.x += player.vx;
            player.y += player.vy;

            if (player.x < player.radius) {
                player.x = player.radius;
                player.vx *= -0.5;
            }
            if (player.x > canvas.width - player.radius) {
                player.x = canvas.width - player.radius;
                player.vx *= -0.5;
            }

            if (rope.active && !rope.hooked) {
                let dx = rope.targetX - rope.hookX;
                let dy = rope.targetY - rope.hookY;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                rope.hookX += (dx / dist) * HOOK_SPEED;
                rope.hookY += (dy / dist) * HOOK_SPEED;
                
                if (dist < HOOK_SPEED) {
                    rope.hookX = rope.targetX;
                    rope.hookY = rope.targetY;
                }

                for (let anchor of anchors) {
                    let ax = anchor.x;
                    let ay = anchor.y + camera.y;
                    let dx = ax - rope.hookX;
                    let dy = ay - rope.hookY;
                    if (Math.sqrt(dx*dx + dy*dy) < anchor.radius + 10) {
                        rope.hooked = true;
                        rope.x = ax;
                        rope.y = ay;
                        break;
                    }
                }
            }

            if (rope.active && rope.hooked) {
                let dx = player.x - rope.x;
                let dy = player.y - rope.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let diff = dist - rope.length;
                
                if (diff > 0) {
                    let nx = dx / dist;
                    let ny = dy / dist;
                    player.x -= nx * diff * 0.1;
                    player.y -= ny * diff * 0.1;
                    player.vx -= nx * diff * 0.02;
                    player.vy -= ny * diff * 0.02;
                }
            }

            camera.targetY = -player.y + canvas.height * 0.6;
            camera.y += (camera.targetY - camera.y) * 0.1;

            for (let platform of platforms) {
                let py = platform.y + camera.y;
                if (player.vy > 0 &&
                    player.x > platform.x &&
                    player.x < platform.x + platform.width &&
                    player.y + player.radius > py &&
                    player.y + player.radius < py + platform.height + 10) {
                    player.y = py - player.radius;
                    player.vy = -12;
                    player.vx += (Math.random() - 0.5) * 2;
                }
            }

            let maxScore = Math.floor(-player.y / 100);
            if (maxScore > score) {
                score = maxScore;
                scoreEl.textContent = score;
            }

            if (player.y > -camera.y + canvas.height + 100) {
                gameOver = true;
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(0, camera.y);

            for (let star of stars) {
                let twinkle = Math.sin(Date.now() / 500 + star.twinkle) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + twinkle * 0.7})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 3;
            for (let platform of platforms) {
                ctx.fillStyle = '#16213e';
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(platform.x, platform.y, platform.width, platform.height, 5);
                ctx.fill();
                ctx.stroke();
            }

            ctx.fillStyle = '#ff6b6b';
            for (let anchor of anchors) {
                ctx.beginPath();
                ctx.arc(anchor.x, anchor.y, anchor.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            if (rope.active) {
                ctx.strokeStyle = rope.hooked ? '#00ff88' : '#ffaa00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                
                if (!rope.hooked) {
                    ctx.lineTo(rope.hookX, rope.hookY);
                } else {
                    ctx.lineTo(rope.x, rope.y);
                }
                ctx.stroke();

                if (!rope.hooked) {
                    ctx.fillStyle = '#ffaa00';
                    ctx.beginPath();
                    ctx.arc(rope.hookX, rope.hookY, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x - 4, player.y - 4, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 48px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = '#fff';
                ctx.font = '24px Segoe UI';
                ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('Click to restart', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousedown', (e) => {
            if (gameOver) {
                init();
                return;
            }
            
            let anchor = findClosestAnchor();
            if (anchor) {
                rope.active = true;
                rope.hooked = false;
                rope.hookX = player.x;
                rope.hookY = player.y;
                rope.targetX = anchor.x;
                rope.targetY = anchor.y + camera.y;
                rope.length = Math.sqrt(
                    Math.pow(player.x - anchor.x, 2) + 
                    Math.pow(player.y - (anchor.y + camera.y), 2)
                );
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (rope.active && rope.hooked) {
                let dx = player.x - rope.x;
                let dy = player.y - rope.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
                
                player.vx = (dx / dist) * speed * 1.2;
                player.vy = (dy / dist) * speed * 1.2 - 5;
            }
            rope.active = false;
            rope.hooked = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            canvas.dispatchEvent(new MouseEvent('mousedown'));
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            canvas.dispatchEvent(new MouseEvent('mouseup'));
        });

        init();
        gameLoop();
    </script>
</body>
</html>
