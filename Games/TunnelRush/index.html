<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunnel Rush</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            border: 2px solid #333;
            border-radius: 10px;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #0f0;
        }
        #start {
            position: absolute;
            color: #fff;
            font-size: 30px;
            text-align: center;
            cursor: pointer;
            text-shadow: 0 0 20px #0ff;
        }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="start">CLICK TO START</div>
    <canvas id="game" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startEl = document.getElementById('start');

        const CENTER_X = canvas.width / 2;
        const CENTER_Y = canvas.height / 2;
        const TUNNEL_RADIUS = 280;
        const SEGMENT_DEPTH = 30;

        let gameRunning = false;
        let score = 0;
        let speed = 3;
        let rotation = 0;
        let rotationSpeed = 0;
        let segments = [];
        let playerAngle = 0;
        let playerSize = 15;
        let distance = 0;

        const colors = ['#ff0044', '#00ff44', '#0044ff', '#ffff00', '#ff00ff', '#00ffff'];

        function init() {
            segments = [];
            score = 0;
            speed = 3;
            rotation = 0;
            rotationSpeed = 0;
            playerAngle = 0;
            distance = 0;
            
            for (let i = 0; i < 40; i++) {
                addSegment(i * SEGMENT_DEPTH);
            }
        }

        function addSegment(z) {
            let type = Math.random();
            let segment = {
                z: z,
                obstacles: []
            };
            
            if (distance > 500) {
                if (type < 0.3) {
                    let angle = Math.random() * Math.PI * 2;
                    let count = 1 + Math.floor(Math.random() * 3);
                    for (let i = 0; i < count; i++) {
                        segment.obstacles.push({
                            angle: angle + (i / count) * Math.PI * 2,
                            width: 0.3 + Math.random() * 0.4,
                            type: 'wedge'
                        });
                    }
                } else if (type < 0.6) {
                    let angle = Math.random() * Math.PI * 2;
                    segment.obstacles.push({
                        angle: angle,
                        width: 0.15 + Math.random() * 0.1,
                        gap: 0.3 + Math.random() * 0.2,
                        type: 'ring'
                    });
                } else {
                    let count = 2 + Math.floor(Math.random() * 3);
                    for (let i = 0; i < count; i++) {
                        segment.obstacles.push({
                            angle: (i / count) * Math.PI * 2 + Math.random() * 0.3,
                            width: 0.2 + Math.random() * 0.2,
                            type: 'bar'
                        });
                    }
                }
            }
            
            segments.push(segment);
        }

        function update() {
            if (!gameRunning) return;
            
            distance += speed;
            score = Math.floor(distance / 10);
            scoreEl.textContent = score;
            
            speed = 3 + distance / 2000;
            
            for (let seg of segments) {
                seg.z -= speed;
            }
            
            segments = segments.filter(seg => seg.z > -SEGMENT_DEPTH);
            
            while (segments.length < 40) {
                let lastZ = segments.length > 0 ? segments[segments.length - 1].z + SEGMENT_DEPTH : 0;
                addSegment(lastZ);
            }
            
            playerAngle += rotationSpeed;
            rotationSpeed *= 0.95;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let sortedSegments = [...segments].sort((a, b) => b.z - a.z);
            
            for (let seg of sortedSegments) {
                if (seg.z < 0 || seg.z > 600) continue;
                
                let scale = 200 / (200 + seg.z);
                let alpha = Math.min(1, (600 - seg.z) / 300);
                
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = colors[Math.floor(seg.z / SEGMENT_DEPTH) % colors.length];
                ctx.lineWidth = 3 * scale;
                
                ctx.beginPath();
                ctx.arc(CENTER_X, CENTER_Y, TUNNEL_RADIUS * scale, 0, Math.PI * 2);
                ctx.stroke();
                
                for (let obs of seg.obstacles) {
                    if (obs.type === 'wedge') {
                        let startAngle = obs.angle - obs.width / 2 + rotation;
                        let endAngle = obs.angle + obs.width / 2 + rotation;
                        
                        ctx.beginPath();
                        ctx.arc(CENTER_X, CENTER_Y, TUNNEL_RADIUS * scale, startAngle, endAngle);
                        ctx.lineTo(CENTER_X, CENTER_Y);
                        ctx.closePath();
                        ctx.fillStyle = obs.type === 'wedge' ? '#ff0044' : '#0044ff';
                        ctx.fill();
                    } else if (obs.type === 'ring') {
                        let innerRadius = TUNNEL_RADIUS * scale * (1 - obs.width);
                        let outerRadius = TUNNEL_RADIUS * scale;
                        
                        ctx.beginPath();
                        ctx.arc(CENTER_X, CENTER_Y, innerRadius, 0, Math.PI * 2);
                        ctx.strokeStyle = '#ff0044';
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.arc(CENTER_X, CENTER_Y, outerRadius, 0, Math.PI * 2);
                        ctx.stroke();
                    } else if (obs.type === 'bar') {
                        let angle = obs.angle + rotation;
                        let x1 = CENTER_X + Math.cos(angle) * TUNNEL_RADIUS * scale * 0.2;
                        let y1 = CENTER_Y + Math.sin(angle) * TUNNEL_RADIUS * scale * 0.2;
                        let x2 = CENTER_X + Math.cos(angle) * TUNNEL_RADIUS * scale;
                        let y2 = CENTER_Y + Math.sin(angle) * TUNNEL_RADIUS * scale;
                        
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = '#ff4444';
                        ctx.lineWidth = 15 * scale;
                        ctx.stroke();
                    }
                }
            }
            
            ctx.globalAlpha = 1;
            
            let playerScale = 200 / (200 + 50);
            let px = CENTER_X + Math.cos(playerAngle) * 120 * playerScale;
            let py = CENTER_Y + Math.sin(playerAngle) * 120 * playerScale;
            
            ctx.fillStyle = '#0f0';
            ctx.shadowColor = '#0f0';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(px, py, playerSize * playerScale, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(px + 3, py - 2, 4, 0, Math.PI * 2);
            ctx.fill();

            checkCollision();
        }

        function checkCollision() {
            let playerZ = 50;
            
            for (let seg of segments) {
                if (Math.abs(seg.z - playerZ) < SEGMENT_DEPTH / 2) {
                    for (let obs of seg.obstacles) {
                        let angleDiff = Math.abs(((obs.angle + rotation) % (Math.PI * 2)) - ((playerAngle % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2)));
                        if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;
                        
                        let obsWidth = obs.width;
                        if (obs.type === 'bar') obsWidth = 0.15;
                        
                        if (angleDiff < obsWidth / 2 + 0.1) {
                            gameOver();
                        }
                    }
                }
            }
        }

        function gameOver() {
            gameRunning = false;
            startEl.style.display = 'block';
            startEl.textContent = 'GAME OVER - CLICK TO RESTART';
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                rotationSpeed = -0.08;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                rotationSpeed = 0.08;
            }
        });

        canvas.addEventListener('click', () => {
            if (!gameRunning) {
                init();
                gameRunning = true;
                startEl.style.display = 'none';
            }
        });

        init();
        gameLoop();
    </script>
</body>
</html>
