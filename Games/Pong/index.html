<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }
        #score {
            position: absolute;
            top: 30px;
            color: #fff;
            font-size: 48px;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>
    <div id="score">0 - 0</div>
    <canvas id="pong" width="800" height="500"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const paddleWidth = 15;
        const paddleHeight = 90;
        const ballSize = 12;

        let playerY = canvas.height / 2 - paddleHeight / 2;
        let aiY = canvas.height / 2 - paddleHeight / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballVX = 6;
        let ballVY = 4;
        let playerScore = 0;
        let aiScore = 0;

        const aiSpeed = 5;

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            playerY = e.clientY - rect.top - paddleHeight / 2;
            playerY = Math.max(0, Math.min(canvas.height - paddleHeight, playerY));
        });

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#fff';
            ctx.setLineDash([10, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#fff';
            ctx.fillRect(20, playerY, paddleWidth, paddleHeight);
            ctx.fillRect(canvas.width - 20 - paddleWidth, aiY, paddleWidth, paddleHeight);

            ctx.beginPath();
            ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            ballX += ballVX;
            ballY += ballVY;

            if (ballY - ballSize < 0 || ballY + ballSize > canvas.height) {
                ballVY = -ballVY;
            }

            if (ballX - ballSize < 20 + paddleWidth && 
                ballY > playerY && 
                ballY < playerY + paddleHeight) {
                ballVX = Math.abs(ballVX);
                ballVY += (ballY - (playerY + paddleHeight / 2)) * 0.1;
            }

            if (ballX + ballSize > canvas.width - 20 - paddleWidth && 
                ballY > aiY && 
                ballY < aiY + paddleHeight) {
                ballVX = -Math.abs(ballVX);
                ballVY += (ballY - (aiY + paddleHeight / 2)) * 0.1;
            }

            if (ballX < 0) {
                aiScore++;
                scoreEl.textContent = `${playerScore} - ${aiScore}`;
                resetBall();
            }
            if (ballX > canvas.width) {
                playerScore++;
                scoreEl.textContent = `${playerScore} - ${aiScore}`;
                resetBall();
            }

            const aiCenter = aiY + paddleHeight / 2;
            if (aiCenter < ballY - 10) {
                aiY += aiSpeed;
            } else if (aiCenter > ballY + 10) {
                aiY -= aiSpeed;
            }
            aiY = Math.max(0, Math.min(canvas.height - paddleHeight, aiY));
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballVX = (Math.random() > 0.5 ? 6 : -6);
            ballVY = (Math.random() * 8 - 4);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
