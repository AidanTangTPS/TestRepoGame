<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Snake Game</h1>
            <div class="score-board">
                <div class="score">
                    <span>Score: </span>
                    <span id="current-score">0</span>
                </div>
                <div class="high-score">
                    <span>High Score: </span>
                    <span id="high-score">0</span>
                </div>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="game-over" class="game-over hidden">
                <h2>Game Over!</h2>
                <p>Your Score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="btn">Play Again</button>
            </div>
        </div>
        
        <div class="controls">
            <div class="instructions">
                <h3>How to Play:</h3>
                <p>Use WASD or Arrow keys to control the snake</p>
                <p>Eat food to grow and earn points</p>
                <p>Avoid hitting walls or yourself</p>
            </div>
            
            <div class="mobile-controls">
                <div class="control-row">
                    <button class="control-btn" data-direction="up">↑</button>
                </div>
                <div class="control-row">
                    <button class="control-btn" data-direction="left">←</button>
                    <button class="control-btn" data-direction="down">↓</button>
                    <button class="control-btn" data-direction="right">→</button>
                </div>
            </div>
            
            <div class="game-buttons">
                <button id="start-btn" class="btn btn-primary">Start Game</button>
                <button id="pause-btn" class="btn btn-secondary">Pause</button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
