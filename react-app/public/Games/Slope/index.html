<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Full Page iFrame</title>
    <style>
        html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* Hides the parent page's scrollbars */
}

iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none; /* Removes the default iframe border */
    display: block;
}

    </style>
</head>
<body>
    <iframe src="https://AidanTangTPS.github.io/Slope-Game" title="Example Website"></iframe>
</body>
</html>
